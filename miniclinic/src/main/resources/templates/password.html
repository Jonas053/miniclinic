<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼</title>
</head>
<body>
    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="error" th:if="${#fields.hasErrors('oldPassword')}"
                 th:errors="*{oldPassword}"></div>
        </div>
        <div class="field">
            <label>新密碼</label>
            <input type="password" th:field="*{newPassword}">
            <div class="error" th:if="${#fields.hasErrors('newPassword')}"
                 th:errors="*{newPassword}"></div>
        </div>
        <div class="field">
            <label>新密碼確認</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}"
                 th:errors="*{confirmPassword}"></div>
        </div>
        <button type="submit">確認修改</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/dashboard}">← 回 Dashboard</a>
    </p>
</body>
</html>
